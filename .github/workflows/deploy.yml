name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'nginx'
      image:
        description: 'Docker image tag'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy Service
        run: |
          echo "Deploying ${{ github.event.inputs.service }}:${{ github.event.inputs.image }}"
          echo "Deployment successful!"
